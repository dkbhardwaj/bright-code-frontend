<svg viewBox="0 0 520 460" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="rqShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0B1B3A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- card -->
  <g filter="url(#rqShadow)">
    <rect x="20" y="16" width="480" height="424" rx="24" fill="#FFFFFF" stroke="#E5E5EA"/>
  </g>

  <!-- header -->
  <text x="52" y="62" font-size="17" font-weight="600" fill="#000D20">Review queue</text>
  <circle cx="416" cy="56" r="14" fill="#0044FF" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="438" cy="56" r="14" fill="#3B82F6" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="460" cy="56" r="14" fill="#93B4FF" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="416" y="60.5" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">S</text>
  <text x="438" y="60.5" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">D</text>
  <text x="460" y="60.5" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">N</text>
  <line x1="52" y1="84" x2="468" y2="84" stroke="#F0F0F3"/>

  <!-- item 1: approved -->
  <rect x="52" y="102" width="416" height="64" rx="14" fill="#FFFFFF" stroke="#E5E5EA"/>
  <circle cx="86" cy="134" r="13" fill="#ECFDF3"/>
  <path d="M 80 134 L 84.5 139 L 92 130" stroke="#16A34A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="112" y="130" font-size="13.5" font-weight="600" fill="#000D20">Q3 performance report</text>
  <text x="112" y="150" font-size="11" fill="#6b7280">AI draft · verified against source data</text>
  <rect x="384" y="122" width="70" height="24" rx="12" fill="#ECFDF3"/>
  <text x="419" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#16A34A">Approved</text>

  <!-- item 2: flagged & corrected (highlighted) -->
  <rect x="52" y="182" width="416" height="94" rx="14" fill="#FFFBF3" stroke="#F59E0B" stroke-width="1.5"/>
  <circle cx="86" cy="214" r="13" fill="#FEF3C7"/>
  <text x="86" y="219" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">!</text>
  <text x="112" y="210" font-size="13.5" font-weight="600" fill="#000D20">Landing page copy</text>
  <text x="112" y="230" font-size="11" fill="#6b7280">Unverified claim caught: &#8220;3&#215; conversion lift&#8221;</text>
  <rect x="400" y="202" width="54" height="24" rx="12" fill="#FEF3C7"/>
  <text x="427" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#D97706">Fixed</text>
  <rect x="112" y="242" width="286" height="22" rx="11" fill="#FFFFFF" stroke="#F0E5CE"/>
  <path d="M 126 253 L 131 258 L 126 263" stroke="#D97706" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(0,-5)"/>
  <text x="140" y="257" font-size="10.5" fill="#6b7280">Corrected by reviewer &#183; fed back into the prompt</text>

  <!-- item 3: approved -->
  <rect x="52" y="292" width="416" height="64" rx="14" fill="#FFFFFF" stroke="#E5E5EA"/>
  <circle cx="86" cy="324" r="13" fill="#ECFDF3"/>
  <path d="M 80 324 L 84.5 329 L 92 320" stroke="#16A34A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="112" y="320" font-size="13.5" font-weight="600" fill="#000D20">Product descriptions &#215; 48</text>
  <text x="112" y="340" font-size="11" fill="#6b7280">Batch reviewed · tone matched to brand guide</text>
  <rect x="384" y="312" width="70" height="24" rx="12" fill="#ECFDF3"/>
  <text x="419" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#16A34A">Approved</text>

  <!-- footer stat -->
  <line x1="52" y1="376" x2="468" y2="376" stroke="#F0F0F3"/>
  <circle cx="64" cy="404" r="4" fill="#0044FF"/>
  <text x="78" y="409" font-size="12" fill="#374151">12 corrections fed back into workflows this week</text>
</svg>
