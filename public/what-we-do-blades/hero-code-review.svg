<svg viewBox="0 0 520 600" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadowCR" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0B1B3A" flood-opacity="0.10"/>
    </filter>
    <filter id="floatShadowCR" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0B1B3A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Editor window -->
  <g filter="url(#cardShadowCR)">
    <rect x="40" y="40" width="440" height="330" rx="16" fill="#0B1226" stroke="#1F2A44"/>
  </g>

  <!-- Title bar -->
  <rect x="40" y="40" width="440" height="40" rx="16" fill="#131B33"/>
  <rect x="40" y="64" width="440" height="16" fill="#131B33"/>
  <circle cx="62" cy="60" r="5" fill="#FF5F57"/>
  <circle cx="80" cy="60" r="5" fill="#FEBC2E"/>
  <circle cx="98" cy="60" r="5" fill="#28C840"/>
  <text x="260" y="64" text-anchor="middle" font-size="12" fill="#8d97ad">feature/checkout.ts</text>

  <!-- AI badge -->
  <rect x="404" y="48" width="60" height="24" rx="12" fill="#1B2648" stroke="#334073"/>
  <text x="434" y="64" text-anchor="middle" font-size="11" font-weight="700" fill="#7C93FF">AI draft</text>

  <!-- Code lines (context) -->
  <text x="64" y="112" font-size="13" fill="#5b6785" font-family="monospace">function calculateTotal(cart) {</text>
  <text x="64" y="136" font-size="13" fill="#5b6785" font-family="monospace">  let total = 0;</text>

  <!-- Removed line -->
  <rect x="48" y="148" width="432" height="24" fill="#3A1421"/>
  <text x="64" y="165" font-size="13" fill="#FF8FA3" font-family="monospace">-   total = total * item.price;</text>

  <!-- Added line -->
  <rect x="48" y="176" width="432" height="24" fill="#0F3320"/>
  <text x="64" y="193" font-size="13" fill="#7BE6A4" font-family="monospace">+   total += item.price * item.qty;</text>

  <!-- More context -->
  <text x="64" y="222" font-size="13" fill="#5b6785" font-family="monospace">  return total;</text>
  <text x="64" y="246" font-size="13" fill="#5b6785" font-family="monospace">}</text>

  <!-- inline review comment marker -->
  <rect x="48" y="262" width="432" height="34" rx="8" fill="#131B33" stroke="#334073" stroke-dasharray="3 3"/>
  <circle cx="66" cy="279" r="9" fill="#0044FF"/>
  <text x="66" y="283" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">JD</text>
  <text x="84" y="283" font-size="12" fill="#B9C2DD">Qty wasn't applied — good catch, verify null case too.</text>

  <!-- bottom context -->
  <text x="64" y="332" font-size="13" fill="#5b6785" font-family="monospace">export default calculateTotal;</text>

  <!-- Floating review-approved card -->
  <g filter="url(#floatShadowCR)">
    <rect x="150" y="404" width="320" height="150" rx="20" fill="#FFFFFF" stroke="#E5E5EA"/>
  </g>
  <circle cx="184" cy="440" r="16" fill="#0044FF" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="184" y="445" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">JD</text>
  <circle cx="404" cy="432" r="15" fill="#16A34A"/>
  <path d="M 397 432 L 402 437.5 L 411 427" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="210" y="446" font-size="17" font-weight="600" fill="#000D20">Senior engineer reviews</text>
  <text x="170" y="480" font-size="12.5" fill="#374151">Security, logic and architecture</text>
  <text x="170" y="499" font-size="12.5" fill="#374151">checked before anything merges</text>
  <rect x="170" y="514" width="140" height="8" rx="4" fill="#DBE4FF"/>
  <rect x="170" y="514" width="112" height="8" rx="4" fill="#0044FF"/>
  <text x="320" y="522" font-size="10.5" fill="#6b7280">review bar</text>

  <!-- Merged badge -->
  <g filter="url(#floatShadowCR)">
    <rect x="16" y="380" width="118" height="56" rx="14" fill="#0F1A33" stroke="#22315A"/>
  </g>
  <circle cx="42" cy="408" r="4" fill="#7BE6A4"/>
  <circle cx="42" cy="392" r="4" fill="#7BE6A4"/>
  <path d="M42 392 L42 408" stroke="#7BE6A4" stroke-width="2"/>
  <path d="M42 400 L58 400" stroke="#7BE6A4" stroke-width="2"/>
  <circle cx="58" cy="400" r="4" fill="#7BE6A4"/>
  <text x="76" y="397" font-size="12" font-weight="600" fill="#FFFFFF">Merged</text>
  <text x="76" y="413" font-size="10.5" fill="#8d97ad">to main</text>
</svg>
