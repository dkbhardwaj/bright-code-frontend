<svg viewBox="0 0 520 460" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="wfShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0B1B3A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- canvas card -->
  <g filter="url(#wfShadow)">
    <rect x="20" y="16" width="480" height="424" rx="24" fill="#FFFFFF" stroke="#E5E5EA"/>
  </g>

  <!-- header -->
  <text x="52" y="62" font-size="17" font-weight="600" fill="#000D20">Weekly client report</text>
  <rect x="396" y="42" width="72" height="28" rx="14" fill="#ECFDF3"/>
  <circle cx="414" cy="56" r="4" fill="#16A34A"/>
  <text x="426" y="61" font-size="12" font-weight="600" fill="#16A34A">Live</text>
  <line x1="52" y1="84" x2="468" y2="84" stroke="#F0F0F3"/>

  <!-- connector spine -->
  <line x1="76" y1="128" x2="76" y2="384" stroke="#DBE4FF" stroke-width="2"/>

  <!-- step 1 -->
  <circle cx="76" cy="128" r="14" fill="#F0F4FF" stroke="#0044FF" stroke-width="1.5"/>
  <text x="76" y="133" text-anchor="middle" font-size="11" font-weight="700" fill="#0044FF">1</text>
  <rect x="104" y="104" width="364" height="52" rx="14" fill="#FFFFFF" stroke="#E5E5EA"/>
  <text x="124" y="126" font-size="13.5" font-weight="600" fill="#000D20">Pull data from your tools</text>
  <rect x="124" y="134" width="64" height="14" rx="7" fill="#F0F4FF"/>
  <text x="156" y="144.5" text-anchor="middle" font-size="9" font-weight="600" fill="#0044FF">Analytics</text>
  <rect x="194" y="134" width="42" height="14" rx="7" fill="#F0F4FF"/>
  <text x="215" y="144.5" text-anchor="middle" font-size="9" font-weight="600" fill="#0044FF">CMS</text>
  <rect x="242" y="134" width="54" height="14" rx="7" fill="#F0F4FF"/>
  <text x="269" y="144.5" text-anchor="middle" font-size="9" font-weight="600" fill="#0044FF">Ad data</text>

  <!-- step 2 -->
  <circle cx="76" cy="212" r="14" fill="#F0F4FF" stroke="#0044FF" stroke-width="1.5"/>
  <text x="76" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#0044FF">2</text>
  <rect x="104" y="188" width="364" height="52" rx="14" fill="#FFFFFF" stroke="#E5E5EA"/>
  <rect x="122" y="202" width="26" height="26" rx="8" fill="#F0F4FF"/>
  <text x="135" y="219" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0044FF">AI</text>
  <text x="160" y="212" font-size="13.5" font-weight="600" fill="#000D20">Draft summary &amp; insights</text>
  <rect x="160" y="220" width="180" height="6" rx="3" fill="#EEF1F6"/>
  <rect x="160" y="220" width="126" height="6" rx="3" fill="#93B4FF"/>

  <!-- step 3 -->
  <circle cx="76" cy="296" r="14" fill="#F0F4FF" stroke="#0044FF" stroke-width="1.5"/>
  <text x="76" y="301" text-anchor="middle" font-size="11" font-weight="700" fill="#0044FF">3</text>
  <rect x="104" y="272" width="364" height="52" rx="14" fill="#FFFFFF" stroke="#E5E5EA"/>
  <text x="124" y="294" font-size="13.5" font-weight="600" fill="#000D20">Auto-checks</text>
  <text x="124" y="312" font-size="11" fill="#6b7280">Numbers match sources · links valid · brand terms</text>
  <circle cx="440" cy="298" r="12" fill="#ECFDF3"/>
  <path d="M 434.5 298 L 438.5 302.5 L 446 294" stroke="#16A34A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- step 4 (highlighted) -->
  <circle cx="76" cy="384" r="14" fill="#0044FF"/>
  <text x="76" y="389" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">4</text>
  <rect x="104" y="358" width="364" height="56" rx="14" fill="#F5F8FF" stroke="#0044FF" stroke-width="1.5"/>
  <circle cx="138" cy="386" r="13" fill="#0044FF" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="158" cy="386" r="13" fill="#93B4FF" stroke="#FFFFFF" stroke-width="2"/>
  <text x="138" y="390.5" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">S</text>
  <text x="158" y="390.5" text-anchor="middle" font-size="10" font-weight="700" fill="#0044FF">D</text>
  <text x="184" y="382" font-size="13.5" font-weight="600" fill="#000D20">Human review before it sends</text>
  <text x="184" y="400" font-size="11" fill="#6b7280">Nothing ships on autopilot</text>
</svg>
