<svg viewBox="0 0 520 600" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0044FF"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8d97ad"/>
    </marker>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0B1B3A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- feedback loop: review -> back into the AI workflow -->
  <path d="M 100 296 L 56 296 Q 40 296 40 280 L 40 96 Q 40 80 56 80 L 88 80" stroke="#8d97ad" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrowGray)"/>
  <text x="68" y="182" text-anchor="middle" font-size="10.5" fill="#8d97ad">corrections</text>
  <text x="68" y="197" text-anchor="middle" font-size="10.5" fill="#8d97ad">feed back</text>

  <!-- Card 1: AI workflow runs -->
  <g filter="url(#cardShadow)">
    <rect x="100" y="16" width="320" height="130" rx="20" fill="#FFFFFF" stroke="#E5E5EA"/>
  </g>
  <rect x="128" y="48" width="44" height="44" rx="12" fill="#F0F4FF"/>
  <text x="150" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#0044FF">AI</text>
  <text x="190" y="72" font-size="17" font-weight="600" fill="#000D20">AI workflow runs</text>
  <text x="190" y="96" font-size="12.5" fill="#6b7280">Drafts, reports, research, code</text>

  <!-- arrow 1 -->
  <line x1="260" y1="150" x2="260" y2="200" stroke="#0044FF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Card 2: Human review (highlighted) -->
  <g filter="url(#cardShadow)">
    <rect x="100" y="210" width="320" height="172" rx="20" fill="#F5F8FF" stroke="#0044FF" stroke-width="1.5"/>
  </g>
  <circle cx="152" cy="262" r="17" fill="#0044FF" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="178" cy="262" r="17" fill="#3B82F6" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="204" cy="262" r="17" fill="#93B4FF" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="152" y="267" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">S</text>
  <text x="178" y="267" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">D</text>
  <text x="204" y="267" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">N</text>
  <circle cx="384" cy="248" r="15" fill="#16A34A"/>
  <path d="M 377 248 L 382 253.5 L 391 243" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="236" y="268" font-size="17" font-weight="600" fill="#000D20">Human review</text>
  <text x="130" y="318" font-size="12.5" fill="#374151">Facts, tone and logic verified</text>
  <text x="130" y="337" font-size="12.5" fill="#374151">by experienced reviewers</text>
  <rect x="130" y="350" width="112" height="8" rx="4" fill="#DBE4FF"/>
  <rect x="130" y="350" width="84" height="8" rx="4" fill="#0044FF"/>
  <text x="252" y="358" font-size="10.5" fill="#6b7280">quality bar</text>

  <!-- arrow 2 -->
  <line x1="260" y1="386" x2="260" y2="436" stroke="#0044FF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Card 3: Client-ready -->
  <g filter="url(#cardShadow)">
    <rect x="100" y="446" width="320" height="130" rx="20" fill="#FFFFFF" stroke="#E5E5EA"/>
  </g>
  <rect x="128" y="478" width="44" height="44" rx="12" fill="#ECFDF3"/>
  <path d="M 141 500 L 148 507.5 L 160 493" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="190" y="502" font-size="17" font-weight="600" fill="#000D20">Client-ready output</text>
  <text x="190" y="526" font-size="12.5" fill="#6b7280">Delivered under your brand</text>
</svg>
